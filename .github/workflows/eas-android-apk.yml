# Build a downloadable Android APK with EAS (preview profile = APK in eas.json).
#
# Setup (once per Git hosting provider, e.g. GitHub):
# 1. Repo → Settings → Secrets and variables → Actions → New repository secret
#    Name:  EXPO_TOKEN
#    Value: create at https://expo.dev/accounts/[your-account]/settings/access-tokens
#
# 2. Link this app to an EAS project and commit app.json (so CI does not create a new project every run):
#    cd mobile-android
#    $env:EXPO_TOKEN = "your_token"   # PowerShell
#    npx eas init --non-interactive
#    git add app.json && git commit -m "Link EAS project" && git push
#
# 3. Run this workflow: Actions → "EAS Android APK" → Run workflow
#
# Optional: connect the same Git repo in the Expo dashboard for Expo-managed Git triggers.

name: EAS Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  build:
    name: EAS build (preview APK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-android/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify EAS project is linked (expo.extra.eas.projectId)
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('app.json','utf8'));if(!j.expo?.extra?.eas?.projectId){console.error('app.json is missing expo.extra.eas.projectId. Run locally: cd mobile-android && npx eas init --non-interactive, then commit app.json and push.');process.exit(1)}"

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (Android APK)
        run: eas build --platform android --profile preview --non-interactive
