# Build a downloadable Android APK with EAS (preview profile = APK in eas.json).
#
# One-time setup (GitHub):
# 1. Repo → Settings → Secrets and variables → Actions → New repository secret
#    Name:  EXPO_TOKEN
#    Value: https://expo.dev/accounts/[your-account]/settings/access-tokens
#
# 2. Actions → "EAS Android APK" → Run workflow
#
# First run: links an EAS project (updates mobile-android/app.json) and commits it,
# then starts the cloud build. Later runs only build.

name: EAS Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  build:
    name: EAS build (preview APK)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-android/package-lock.json

      - name: Install dependencies
        working-directory: mobile-android
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Ensure EAS project is linked (first run only)
        working-directory: mobile-android
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('app.json','utf8'));process.exit(j.expo?.extra?.eas?.projectId?0:1)" || eas init --non-interactive

      - name: Commit EAS project id if added
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile-android/app.json
          if git diff --staged --quiet; then
            echo "No EAS project id change to commit."
          else
            git commit -m "chore(ci): add EAS project id for builds"
            git push
          fi

      - name: EAS build (Android APK)
        working-directory: mobile-android
        run: eas build --platform android --profile preview --non-interactive
